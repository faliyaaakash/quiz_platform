version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: quiz-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: quiz-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: quiz-frontend
    restart: unless-stopped
    ports:
      # Expose Nginx on port 80
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
